version: '3.8'

services:
  ping-1:
    image: python:3.11-alpine
    container_name: ping-service-1
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - PONG_MESSAGE=pong-from-port-5001
      - SERVICE_NAME=ping-service-5001
    command: >
      sh -c "pip install flask &&
      python -c '
      import os, flask, datetime
      app = flask.Flask(__name__)
      PORT = int(os.environ.get(\"PORT\", 5000))
      PONG = os.environ.get(\"PONG_MESSAGE\", \"pong\")
      NAME = os.environ.get(\"SERVICE_NAME\", \"service\")
      @app.route(\"/ping\")
      def ping():
          return {\"service\": NAME, \"response\": PONG, \"port\": PORT, \"timestamp\": str(datetime.datetime.now())}
      app.run(host=\"0.0.0.0\", port=PORT)
      '"
    restart: unless-stopped

